<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ransomware Demo</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: black;
        color: red;
        text-align: center;
    }

    .container {
        padding: 20px;
        max-width: 500px;
        margin: auto;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 15px;
    }

    p {
        font-size: 15px;
        color: #ff4d4d;
        line-height: 1.5;
    }

    .timer {
        font-size: 24px;
        margin: 15px 0;
        color: yellow;
    }

    .progress {
        width: 100%;
        height: 20px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
        margin: 15px 0;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: red;
    }

    .button {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        background: green;
        color: white;
        border: none;
        font-size: 16px;
        border-radius: 6px;
    }

    .safe {
        margin-top: 20px;
        color: lightgreen;
        display: none;
    }

    /* Kichik ekranlar uchun */
    @media (max-width: 400px) {
        h1 {
            font-size: 20px;
        }
        .timer {
            font-size: 20px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚠️ Your Files Have Been Encrypted!</h1>

    <p>Your important files have been encrypted using military-grade encryption.</p>
    <p>Pay <b>0.05 Bitcoin</b> within:</p>

    <div class="timer" id="timer">24:00:00</div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
    <p>Encrypting files... <span id="percent">0%</span></p>

    <button class="button" onclick="showSafe()">Pay & Decrypt</button>

    <div class="safe" id="safeMessage">
        <h2>😄 Relax! This is just a demo!</h2>
        <p>You just learned how ransomware works.</p>
        <p><b>Don't click suspicious links!</b></p>
    </div>
</div>

<script>
    // Timer
    let time = 24 * 60 * 60;
    setInterval(() => {
        let h = Math.floor(time / 3600);
        let m = Math.floor((time % 3600) / 60);
        let s = time % 60;

        document.getElementById("timer").innerText =
            `${h}:${m}:${s}`;

        if (time > 0) time--;
    }, 1000);

    // Progress
    let progress = 0;
    setInterval(() => {
        if (progress < 100) {
            progress++;
            document.getElementById("bar").style.width = progress + "%";
            document.getElementById("percent").innerText = progress + "%";
        }
    }, 100);

    function showSafe() {
        document.getElementById("safeMessage").style.display = "block";
    }
</script>

</body>
</html>
