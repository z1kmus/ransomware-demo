<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ransomware Demo</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: black;
        color: red;
        text-align: center;
        animation: glitchBg 1s infinite alternate;
    }

    @keyframes glitchBg {
        0% { background-color: black; }
        100% { background-color: #050000; }
    }

    .container {
        padding: 20px;
        max-width: 500px;
        margin: auto;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 15px;
        animation: flicker 1s infinite;
    }

    @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }

    p {
        font-size: 15px;
        color: #ff4d4d;
    }

    .timer {
        font-size: 26px;
        margin: 15px 0;
        color: yellow;
    }

    .progress {
        width: 100%;
        height: 20px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
        margin: 15px 0;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: red;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0% { background: red; }
        50% { background: darkred; }
        100% { background: red; }
    }

    .button {
        margin-top: 20px;
        padding: 14px;
        width: 100%;
        background: green;
        color: white;
        border: none;
        font-size: 16px;
        border-radius: 6px;
    }

    .safe {
        margin-top: 20px;
        color: lightgreen;
        display: none;
    }

    .warning {
        color: white;
        margin-top: 10px;
        font-size: 13px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="container">
    <h1>⚠️ Your Files Have Been Encrypted!</h1>

    <p>All your files are locked with military encryption.</p>
    <p>Pay <b>0.05 BTC</b> within:</p>

    <div class="timer" id="timer">24:00:00</div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
    <p>Encrypting files... <span id="percent">0%</span></p>

    <button class="button" onclick="showSafe()">Pay & Decrypt</button>

    <div class="safe" id="safeMessage">
        <h2>😄 Bu faqat demo!</h2>
        <p>Siz ransomware qanday ishlashini ko‘rdingiz.</p>
        <p><b>Shubhali linklarga bosmang!</b></p>
    </div>

    <p class="warning">Do not close this page...</p>
</div>

<!-- sound -->
<audio id="beep" loop>
    <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
    // 🔊 Sound (user interactiondan keyin ishlaydi)
    document.body.addEventListener("click", () => {
        document.getElementById("beep").play();
    }, { once: true });

    // ⏳ Timer
    let time = 24 * 60 * 60;
    setInterval(() => {
        let h = Math.floor(time / 3600);
        let m = Math.floor((time % 3600) / 60);
        let s = time % 60;

        document.getElementById("timer").innerText =
            `${h}:${m}:${s}`;

        if (time > 0) time--;
    }, 1000);

    // 📊 Progress
    let progress = 0;
    setInterval(() => {
        if (progress < 100) {
            progress++;
            document.getElementById("bar").style.width = progress + "%";
            document.getElementById("percent").innerText = progress + "%";
        }
    }, 80);

    // 📳 Vibration (faqat mobile)
    if (navigator.vibrate) {
        setInterval(() => {
            navigator.vibrate(200);
        }, 3000);
    }

    function showSafe() {
        document.getElementById("safeMessage").style.display = "block";
    }
</script>

</body>
</html>
